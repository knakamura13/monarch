<!doctype html>
<html lang="en" class="app-html">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
        <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
        <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
        <meta name="theme-color" content="#f5f0e8" />
        <meta name="application-name" content="Monarch" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Monarch" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

        <link rel="apple-touch-icon" href="/pwa/apple-icon-180.png">
        <link rel="apple-touch-startup-image" href="/pwa/apple-splash-2048-2732.jpg" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
        <link rel="apple-touch-startup-image" href="/pwa/apple-splash-2732-2048.jpg" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)">
        <!-- (Truncated for brevity; all tags will be added) -->
        <meta name="color-scheme" content="light" />
        <meta name="robots" content="noindex,nofollow" />

        <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&display=swap"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <title>Monarch</title>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover" class="app-body" style="background: #f5f0e8">
        <div id="app" style="display: contents">%sveltekit.body%</div>
    </body>
</html>
